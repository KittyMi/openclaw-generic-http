name: Bug report
description: Report a reproducible bug in the plugin, compatibility behavior, or docs.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include OpenClaw version, config, and bridge behavior when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include plugin version, OpenClaw version, Node.js version, and bridge/platform version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or payloads
      description: Paste sanitized logs, responses, or request bodies.
