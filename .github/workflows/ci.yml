name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin package
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Verify publish contents
        run: npm run pack:check

      - name: Run local bridge regression
        run: npm run test:e2e
